name: Send Appointment Reminders

on:
  schedule:
    # Todos los días a las 13:00 UTC (10:00 AM Buenos Aires)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send appointment reminders
        run: |
          curl -f -X POST \
            -H "X-API-Key: ${{ secrets.REMINDERS_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.BACKEND_URL }}/api/internal/enviar-recordatorios/"
